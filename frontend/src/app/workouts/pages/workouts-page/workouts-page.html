<div style="display: flex; justify-content: space-between; align-items: center;">
  <h1>Workouts</h1>
  <div>
    <button (click)="openCatalog()" style="margin-right: 0.5rem;">Oefeningen Catalogus</button>
    <button (click)="logout()" style="height: fit-content;">Uitloggen</button>
  </div>
</div>

<div *ngIf="errorMessage" style="color: red; margin-bottom: 1rem;">
  {{ errorMessage }}
</div>

<section style="margin-bottom: 2rem; padding: 1rem; border: 1px solid #ccc;">
  <h3>Nieuwe Workout Toevoegen</h3>
  <div style="margin-bottom: 0.5rem;">
    <label>Datum:</label><br>
    <input type="date" [(ngModel)]="newWorkout.date">
  </div>
  <div style="margin-bottom: 0.5rem;">
    <label>Naam:</label><br>
    <input type="text" [(ngModel)]="newWorkout.name" placeholder="Bijv. Push Day">
  </div>
  <div style="margin-bottom: 0.5rem;">
    <label>Beschrijving:</label><br>
    <textarea [(ngModel)]="newWorkout.description" placeholder="Optionele beschrijving"></textarea>
  </div>
  <button (click)="addWorkout()">Toevoegen</button>
</section>

<section>
  <h3>Workout Lijst</h3>
  <ul style="list-style: none; padding: 0;">
    <li *ngFor="let workout of workouts" style="margin-bottom: 1rem; padding: 0.5rem; border-bottom: 1px solid #eee;">
      <strong>{{ workout.date }}</strong> - {{ workout.name }}
      <span *ngIf="workout.description"> ({{ workout.description }})</span>
      <div style="margin-top: 0.3rem;">
        <button (click)="openWorkout(workout.id)" style="margin-right: 0.5rem;">Oefeningen</button>
        <button (click)="updateWorkout(workout)" style="margin-right: 0.5rem;">Bewerken</button>
        <button (click)="deleteWorkout(workout.id)" style="color: red;">Verwijderen</button>
      </div>
    </li>
  </ul>
  <p *ngIf="workouts.length === 0 && !errorMessage">Geen workouts om weer te geven.</p>
</section>
