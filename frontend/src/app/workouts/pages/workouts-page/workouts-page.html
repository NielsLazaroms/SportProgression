<h1>Workouts</h1>

<div *ngIf="errorMessage" style="color: red; margin-bottom: 1rem;">
  {{ errorMessage }}
</div>

<section style="margin-bottom: 2rem; padding: 1rem; border: 1px solid #ccc;">
  <h3>Nieuwe Workout Toevoegen</h3>
  <div style="margin-bottom: 0.5rem;">
    <label>Datum:</label><br>
    <input type="date" [(ngModel)]="newWorkout.date">
  </div>
  <div style="margin-bottom: 0.5rem;">
    <label>Opmerking:</label><br>
    <textarea [(ngModel)]="newWorkout.note" placeholder="Wat heb je gedaan?"></textarea>
  </div>
  <button (click)="addWorkout()">Toevoegen</button>
</section>

<section>
  <h3>Workout Lijst</h3>
  <ul style="list-style: none; padding: 0;">
    <li *ngFor="let workout of workouts" style="margin-bottom: 1rem; padding: 0.5rem; border-bottom: 1px solid #eee;">
      <strong>{{ workout.date }}</strong> - {{ workout.note }}
      <div style="margin-top: 0.3rem;">
        <button (click)="getWorkout(workout.id)" style="margin-right: 0.5rem;">Details</button>
        <button (click)="updateWorkout(workout)" style="margin-right: 0.5rem;">Bewerken</button>
        <button (click)="deleteWorkout(workout.id)" style="color: red;">Verwijderen</button>
      </div>
    </li>
  </ul>
  <p *ngIf="workouts.length === 0 && !errorMessage">Geen workouts om weer te geven.</p>
</section>
